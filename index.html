<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRM Full Stack Challenge</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Floating Animation for Header */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }

        h1 { 
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: float 4s ease-in-out infinite;
        }

        p { text-align: center; color: #94a3b8; margin-bottom: 2rem; }

        textarea { 
            width: 100%; 
            height: 120px; 
            background: #0f172a;
            color: #38bdf8;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            box-sizing: border-box;
            resize: none;
            transition: border-color 0.3s;
        }

        textarea:focus { outline: none; border-color: var(--primary); }

        button { 
            width: 100%;
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600; 
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }

        button:hover { 
            background: var(--primary-hover); 
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .result-section { 
            margin-top: 30px; 
            display: none; 
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        pre { 
            background: #000; 
            color: #4ade80; 
            padding: 20px; 
            border-radius: 12px; 
            font-size: 13px;
            overflow-x: auto;
            border: 1px solid #22c55e44;
        }

        .error { color: #fb7185; background: #4c1d24; padding: 12px; border-radius: 8px; margin-top: 15px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hierarchy Processor</h1>
        <p>SRM Engineering Challenge • Round 1</p>
        
        <textarea id="nodeInput">["A->B", "A->C", "B->D", "X->Y", "Y->Z", "Z->X", "hello"]</textarea>
        
        <button onclick="submitData()">Process Reality</button>
        
        <div id="errorMessage" class="error"></div>

        <div id="resultSection" class="result-section">
            <h3 style="color: #94a3b8; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Output Log:</h3>
            <pre id="jsonOutput"></pre>
        </div>
    </div>

    <script>
        async function submitData() {
            const input = document.getElementById('nodeInput').value;
            const errorDiv = document.getElementById('errorMessage');
            const resultDiv = document.getElementById('resultSection');
            const output = document.getElementById('jsonOutput');

            errorDiv.style.display = 'none';
            resultDiv.style.display = 'none';

            try {
                const parsedData = JSON.parse(input);
                const response = await fetch('https://srm-fullstack-challenge.onrender.com/bfhl', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: parsedData })
                });

                if (!response.ok) throw new Error('API unreachable. Is node server running?');

                const data = await response.json();
                output.textContent = JSON.stringify(data, null, 2);
                resultDiv.style.display = 'block';

            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
